<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>ILM DEVONI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1c1c1e; color: #fff; font-family: sans-serif; padding: 20px; }
        .btn { background: #2481cc; border: none; padding: 15px; border-radius: 10px; color: white; width: 100%; margin-top: 10px; cursor: pointer; }
        .option { background: #2c2c2e; border: 1px solid #3a3a3c; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth">
    <h3>Ism va Familiyangizni kiriting:</h3>
    <input type="text" id="name" placeholder="Ism" style="padding:10px; width:90%;">
    <input type="text" id="surname" placeholder="Familiya" style="padding:10px; width:90%; margin-top:10px;">
    <button class="btn" onclick="saveUser()">Testni boshlash</button>
</div>

<div id="quiz" style="display:none;">
    <h3 id="question">Savol yuklanmoqda...</h3>
    <div id="options"></div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    let dataset = [];
    let currentQ = 0;
    let score = 0;

    // 1. Сохранение пользователя
    function saveUser() {
        let name = document.getElementById('name').value;
        let surname = document.getElementById('surname').value;
        if(!name || !surname) return alert("Iltimos, ism va familiyangizni kiriting!");
        localStorage.setItem('user', name + ' ' + surname);
        document.getElementById('auth').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        loadTasks();
    }

    // 2. Загрузка задач из tasks.json
    async function loadTasks() {
        const response = await fetch('tasks.json');
        dataset = await response.json();
        showQuestion();
    }

    // 3. Показ вопроса
    function showQuestion() {
        if(currentQ >= dataset.length) return finishTest();
        let q = dataset[currentQ];
        document.getElementById('question').innerText = q.description;
        let optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        
        for(let key in q.options) {
            optDiv.innerHTML += `<div class="option" onclick="check('${key}')">${key}: ${q.options[key]}</div>`;
        }
    }

    // 4. Проверка ответа
    function check(key) {
        if(key === dataset[currentQ].correct_option) score++;
        currentQ++;
        showQuestion();
    }

    // 5. Завершение
    function finishTest() {
        let user = localStorage.getItem('user');
        tg.sendData(JSON.stringify({
            user: user,
            correct: score,
            total: dataset.length
        }));
        tg.close();
    }
</script>
</body>
</html>
