<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILM DEVONI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
            color: #2481cc;
            width: 100%;
            background: #2c2c2e;
            box-sizing: border-box;
            border-bottom: 1px solid #3a3a3c;
        }

        .quiz-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card {
            background: #2c2c2e;
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
            margin: auto 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 45px;
            margin-bottom: 15px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .info-text {
            font-size: 14px;
            color: #aeaeb2;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .progress {
            font-size: 13px;
            color: #aeaeb2;
            margin-bottom: 12px;
            align-self: flex-start;
        }

        .question-card {
            background: #2c2c2e;
            border-radius: 16px;
            padding: 20px;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .option-item {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: #ffffff;
            width: 100%;
            box-sizing: border-box;
        }

        .option-item.selected {
            border-color: #2481cc;
            background: rgba(36, 129, 204, 0.15);
        }

        .badge {
            background: #3a3a3c;
            color: #ffffff;
            border-radius: 6px;
            font-weight: bold;
            padding: 4px 8px;
            margin-right: 12px;
            font-size: 13px;
        }

        .option-item.selected .badge {
            background: #2481cc;
        }

        .action-box {
            margin-top: auto;
            padding-top: 20px;
            width: 100%;
        }

        .btn {
            width: 100%;
            background-color: #2481cc;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:disabled {
            background-color: #3a3a3c;
            color: #767680;
            cursor: not-allowed;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="header">ILM DEVONI (Doniyor)</div>

    <div class="quiz-container" id="start-screen">
        <div class="card">
            <div class="icon">📋</div>
            <div class="title" id="test-title">Matematika Testi</div>
            <div class="info-text" id="test-desc">Test yuklanmoqda, iltimos kuting...</div>
            <button class="btn" id="start-btn" disabled onclick="startQuiz()">Testni boshlash</button>
        </div>
    </div>

    <div class="quiz-container hidden" id="quiz-screen">
        <div class="progress" id="progress-lbl">Savol: 1 / 1</div>
        <div class="question-card" id="question-lbl">...</div>
        <div class="options-list" id="options-block"></div>
        <div class="action-box">
            <button class="btn" id="next-btn" disabled onclick="handleNext()">Keyingi savol ➔</button>
        </div>
    </div>

    <div class="quiz-container hidden" id="finish-screen">
        <div class="card">
            <div class="icon">🎉</div>
            <div class="title">Siz testni yakunladingiz!</div>
            <div class="info-text">Barcha javoblar muvaffaqiyatli qabul qilindi. Natijani bot orqali bilib olishingiz mumkin.</div>
            <button class="btn" onclick="closeApp()">Yopish</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let dataset = [];
        let activeIdx = 0;
        let pickedKey = null;

        function loadData() {
            const params = new URLSearchParams(window.location.search);
            const rawParam = params.get('tgWebAppStartParam');

            if (rawParam) {
                try {
                    const binary = atob(rawParam.replace(/-/g, '+').replace(/_/g, '/'));
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) {
                        bytes[i] = binary.charCodeAt(i);
                    }
                    const text = new TextDecoder('utf-8').decode(bytes);
                    dataset = JSON.parse(text);

                    if (dataset && dataset.length > 0) {
                        document.getElementById('test-title').innerText = dataset[0].title || "Matematika Testi";
                        document.getElementById('test-desc').innerText = `Ushbu blokda jami ${dataset.length} ta savol mavjud. Tayyor bo'lsangiz, boshlash tugmasini bosing.`;
                        document.getElementById('start-btn').disabled = false;
                    }
                } catch (err) {
                    document.getElementById('test-title').innerText = "Xatolik";
                    document.getElementById('test-desc').innerText = "Ma'lumotlarni dekodlashda xatolik yuz berdi.";
                }
            } else {
                document.getElementById('test-title').innerText = "Diqqat";
                document.getElementById('test-desc').innerText = "Hech qanday test parametrlari topilmadi.";
            }
        }

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            displayQuestion();
        }

        function displayQuestion() {
            if (activeIdx >= dataset.length) {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('finish-screen').classList.remove('hidden');
                return;
            }

            pickedKey = null;
            document.getElementById('next-btn').disabled = true;

            const item = dataset[activeIdx];
            document.getElementById('progress-lbl').innerText = `Savol: ${activeIdx + 1} / ${dataset.length}`;
            document.getElementById('question-lbl').innerText = item.description;

            const targetBlock = document.getElementById('options-block');
            targetBlock.innerHTML = '';

            ['A', 'B', 'C', 'D'].forEach(k => {
                if (item.options && item.options[k]) {
                    const optionBtn = document.createElement('button');
                    optionBtn.className = 'option-item';
                    optionBtn.id = `block-${k}`;
                    optionBtn.onclick = () => chooseOption(k);
                    optionBtn.innerHTML = `<span class="badge">${k}</span><span>${item.options[k]}</span>`;
                    targetBlock.appendChild(optionBtn);
                }
            });
        }

        function chooseOption(k) {
            document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
            document.getElementById(`block-${k}`).classList.add('selected');
            pickedKey = k;
            document.getElementById('next-btn').disabled = false;
        }

        function handleNext() {
            activeIdx++;
            displayQuestion();
        }

        function closeApp() {
            tg.close();
        }

        window.onload = loadData;
    </script>
</body>
</html>
